name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  python:
    name: Python · pytest + bandit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest bandit

      - name: Run pytest
        run: python -m pytest tests/ -v --tb=short

      - name: Run bandit security scan
        run: python -m bandit -r backend/ -ll

  frontend:
    name: Frontend · Node.js tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Syntax check
        run: |
          node --check frontend/js/app.js
          node --check frontend/js/bridge-shim.js
          node --check frontend/js/dashboard-live.js
          node --check frontend/js/preflight-view.js
          node --check frontend/js/htmlpdf-view.js
          node --check frontend/js/tuto-overlay.js

      - name: Run frontend tests
        run: node tests/frontend/test_activity_analysis.mjs
